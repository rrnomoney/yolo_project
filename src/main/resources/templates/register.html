<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>用户注册</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; color: #666; font-size: 0.9rem; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: #3498db; }
        button { width: 100%; padding: 0.8rem; background: #2ecc71; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; }
        button:hover { background: #27ae60; }
        .login-link { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; color: #7f8c8d; }
        .login-link a { color: #3498db; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>用户注册</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required placeholder="请设置用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="请设置密码">
            </div>
            <button type="submit">立即注册</button>
        </form>
        <div class="login-link">
            已有账号？ <a th:href="@{/toLogin}">去登录</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/api/user/register', {
                method: 'POST',
                body: formData
            });
            const result = await response.json();
            if (result.success) {
                alert('注册成功！');
                window.location.href = '/toLogin';
            } else {
                alert('注册失败: ' + result.message);
            }
        });
    </script>
</body>
</html>
