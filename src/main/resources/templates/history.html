<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>检测历史记录</title>
    <link rel="stylesheet" href="/css/history.css">
</head>
<body>
<div class="page-container">

    <div class="header">
        <h1>检测历史记录</h1>
        <div>
            <a href="/api/detect/toDetect" class="btn" style="margin-right: 10px;">返回检测</a>
            <a href="/api/detect/stats" class="btn" style="margin-right: 10px;">统计分析</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn logout-btn">退出登录</button>
            </form>
        </div>
    </div>

    <table>
        <thead>
        <tr>
            <th>预览</th>
            <th>文件名称</th>
            <th>检测时间</th>
            <th>检测结果</th>
            <th>操作</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${records != null and #lists.isEmpty(records)}" class="no-records-row">
            <td colspan="5">暂无检测记录</td>
        </tr>

        <tr th:each="record : ${records}">
            <!-- 预览 -->
            <td>
                <!-- 图片 -->
                <div th:if="${record.fileType == 'image' || record.fileType == null}">
                    <img class="thumb" alt="检测图">
                </div>

                <!-- 视频 -->
                <div th:if="${record.fileType == 'video'}">
                    <video class="thumb-video" controls th:src="${record.videoUrl}"></video>
                </div>
            </td>

            <!-- 文件名称 -->
            <td>
                <div class="file-name" th:text="${record.imageName}"></div>
            </td>

            <!-- 时间 -->
            <td>
                <div class="detect-time"
                     th:text="${#temporals.format(record.detectTime, 'yyyy-MM-dd HH:mm:ss')}"></div>
            </td>

            <!-- 检测结果 -->
            <td>
                <!-- 图片记录 -->
                <div th:if="${record.fileType == 'image' || record.fileType == null}"
                     class="result-container"
                     th:attr="data-json=${record.detectResult}">
                    <!-- JS 动态填充 -->
                </div>

                <!-- 视频记录 -->
                <div th:if="${record.fileType == 'video'}" class="video-history-box">
                    <div class="result-summary">
                        <span class="summary-tag summary-total">文件类型：视频</span>
                        <span class="summary-tag"
                              th:text="'总帧数：' + ${record.frameCount} + ' 帧'"></span>
                    </div>

                    <details class="details-box">
                        <summary>查看视频</summary>
                        <div class="detail-content">
                            <video controls class="history-video-player" th:src="${record.videoUrl}"></video>
                        </div>
                    </details>
                </div>
            </td>

            <!-- 操作 -->
            <td class="action-cell">
                <form th:action="@{'/api/detect/history/delete/' + ${record.id}}" method="post"
                      onsubmit="return confirm('确定删除这条检测记录吗？');">
                    <button type="submit" class="delete-btn">删除</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<script src="/js/history.js"></script>
</body>
</html>
