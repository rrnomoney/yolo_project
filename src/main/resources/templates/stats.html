<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>检测统计分析</title>
    <link rel="stylesheet" href="/css/stats.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>
</head>
<body>
<div class="page-container">

    <div class="header">
        <h1>检测统计分析</h1>
        <div>
            <a href="/api/detect/toDetect" class="btn" style="margin-right: 10px;">返回检测</a>
            <a href="/api/detect/history" class="btn" style="margin-right: 10px;">检测历史</a>
            <form th:action="@{/logout}" method="post" style="display: inline;">
                <button type="submit" class="btn logout-btn">退出登录</button>
            </form>
        </div>
    </div>

    <div th:if="${totalFiles == 0}" class="empty-box">
        当前还没有检测记录，先去上传图片或视频检测吧。
    </div>

    <div th:if="${totalFiles > 0}">
        <div class="overview-grid">
            <div class="overview-card">
                <div class="overview-title">累计检测文件数</div>
                <div class="overview-value" th:text="${totalFiles}"></div>
            </div>

            <div class="overview-card">
                <div class="overview-title">图片文件数</div>
                <div class="overview-value" th:text="${totalImages}"></div>
            </div>

            <div class="overview-card">
                <div class="overview-title">视频文件数</div>
                <div class="overview-value" th:text="${totalVideos}"></div>
            </div>

            <div class="overview-card">
                <div class="overview-title">累计检测目标数</div>
                <div class="overview-value" th:text="${totalObjects}"></div>
            </div>

            <div class="overview-card">
                <div class="overview-title">视频去重目标数</div>
                <div class="overview-value" th:text="${totalUniqueObjects}"></div>
            </div>

            <div class="overview-card">
                <div class="overview-title">目标类别数</div>
                <div class="overview-value" th:text="${classTypeCount}"></div>
            </div>
        </div>

        <div class="chart-card">
            <div class="chart-title">总目标累计次数柱状图</div>
            <div id="barChart"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">总目标累计次数占比饼图</div>
            <div id="pieChart"></div>
        </div>

        <div class="chart-card">
            <div class="chart-title">视频去重目标统计图</div>
            <div id="uniqueChart"></div>
        </div>
    </div>

</div>

<!-- 用 data-* 给外部 js 传数据 -->
<div id="statsData"
     th:attr="data-class-count-map=${classCountMapJson},
              data-video-unique-count-map=${videoUniqueCountMapJson}"
     style="display:none;"></div>

<script src="/js/stats.js"></script>
</body>
</html>
